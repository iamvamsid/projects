<svg width="680" viewBox="0 0 680 372" role="img" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <title>Project 2 support agent architecture</title>
  <desc>A customer turn enters an agent loop that routes and chains across three tools — account status, doc search reusing Project 1's RAG index, and plan entitlements — backed by bounded memory, with every run emitting a trace of steps, tokens, cost and latency.</desc>
  <defs>
    <marker id="ah" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#888780"/>
    </marker>
  </defs>

  <!-- customer -->
  <rect x="40" y="150" width="120" height="72" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="1.5"/>
  <text x="100" y="182" text-anchor="middle" font-size="14" font-weight="500" fill="#2C2C2A">Customer</text>
  <text x="100" y="201" text-anchor="middle" font-size="12" fill="#5F5E5A">one chat turn</text>

  <!-- agent loop -->
  <rect x="240" y="128" width="152" height="112" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="1.5"/>
  <text x="316" y="172" text-anchor="middle" font-size="14" font-weight="500" fill="#26215C">Agent loop</text>
  <text x="316" y="191" text-anchor="middle" font-size="12" fill="#534AB7">routes + chains tools</text>

  <!-- memory -->
  <rect x="240" y="270" width="152" height="56" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="1.5"/>
  <text x="316" y="294" text-anchor="middle" font-size="14" font-weight="500" fill="#2C2C2A">Memory</text>
  <text x="316" y="312" text-anchor="middle" font-size="12" fill="#5F5E5A">history, bounded</text>

  <!-- tools -->
  <rect x="455" y="58" width="185" height="58" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1.5"/>
  <text x="547" y="82" text-anchor="middle" font-size="14" font-weight="500" fill="#085041">get_account_status</text>
  <text x="547" y="100" text-anchor="middle" font-size="12" fill="#0F6E56">plan, billing, incident</text>

  <rect x="455" y="130" width="185" height="58" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1.5"/>
  <text x="547" y="154" text-anchor="middle" font-size="14" font-weight="500" fill="#085041">search_docs</text>
  <text x="547" y="172" text-anchor="middle" font-size="12" fill="#0F6E56">Project 1 RAG (reused)</text>

  <rect x="455" y="202" width="185" height="58" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1.5"/>
  <text x="547" y="226" text-anchor="middle" font-size="14" font-weight="500" fill="#085041">get_plan_features</text>
  <text x="547" y="244" text-anchor="middle" font-size="12" fill="#0F6E56">entitlements: SLA, SSO</text>

  <!-- trace -->
  <rect x="455" y="286" width="185" height="58" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="1.5"/>
  <text x="547" y="310" text-anchor="middle" font-size="14" font-weight="500" fill="#4A1B0C">Trace</text>
  <text x="547" y="328" text-anchor="middle" font-size="12" fill="#993C1D">steps · tokens · cost · latency</text>

  <!-- connectors -->
  <line x1="160" y1="176" x2="236" y2="176" stroke="#888780" stroke-width="1.5" marker-end="url(#ah)"/>
  <text x="198" y="169" text-anchor="middle" font-size="12" fill="#5F5E5A">question</text>
  <line x1="240" y1="206" x2="164" y2="206" stroke="#888780" stroke-width="1.5" marker-end="url(#ah)"/>
  <text x="198" y="222" text-anchor="middle" font-size="12" fill="#5F5E5A">answer</text>

  <line x1="392" y1="160" x2="451" y2="92" stroke="#888780" stroke-width="1.5" marker-end="url(#ah)"/>
  <line x1="392" y1="172" x2="451" y2="160" stroke="#888780" stroke-width="1.5" marker-end="url(#ah)"/>
  <line x1="392" y1="186" x2="451" y2="228" stroke="#888780" stroke-width="1.5" marker-end="url(#ah)"/>

  <line x1="316" y1="270" x2="316" y2="244" stroke="#888780" stroke-width="1.5" marker-end="url(#ah)"/>
  <line x1="316" y1="240" x2="316" y2="266" stroke="#888780" stroke-width="1.5" marker-end="url(#ah)"/>
  <text x="400" y="262" text-anchor="start" font-size="12" fill="#5F5E5A">remembers turns</text>

  <line x1="392" y1="216" x2="451" y2="300" stroke="#888780" stroke-width="1.5" marker-end="url(#ah)"/>
  <text x="406" y="276" text-anchor="middle" font-size="12" fill="#5F5E5A">every run</text>
</svg>
